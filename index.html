<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anthony Simon | Cybersecurity Portfolio</title>
  <meta name="description" content="Portafolio de Anthony Simon, especialista en ciberseguridad, gestión de infraestructuras críticas y mitigación de riesgos.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f19;
      --surface: #131b2e;
      --border: rgba(255, 255, 255, 0.08);
      --primary: #10b981;
      --accent: #3b82f6;
      --text-white: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      color: var(--text-white);
      font-family: 'Plus Jakarta Sans', sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      padding-top: 70px;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    /* Navbar fija */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem;
      z-index: 1000;
    }
    nav ul { display: flex; justify-content: center; gap: 2rem; list-style: none; }
    nav a { color: var(--text-white); text-decoration: none; transition: color 0.3s ease; }
    nav a:hover { color: var(--primary); }

    /* Header */
    header { padding: 5rem 0 3rem 0; border-bottom: 1px solid var(--border); position: relative; }
    header::before {
      content: ''; position: absolute; top: 0; left: 25%; width: 50%; height: 100%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero { max-width: 800px; }
    .hero h1 {
      font-size: 3rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.5rem;
      background: linear-gradient(to right, #fff, var(--text-muted));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero h1 span { color: var(--primary); -webkit-text-fill-color: initial; }
    .title-sub { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 1.1rem; margin-bottom: 1.5rem; display: block; }
    .about-text { color: var(--text-muted); font-size: 1.1rem; max-width: 700px; margin-bottom: 2rem; }
    .links-geo { display: flex; gap: 1rem; }
    .btn {
      display: inline-flex; align-items: center; padding: 0.6rem 1.5rem; border-radius: 6px;
      font-size: 0.95rem; font-weight: 500; text-decoration: none; transition: all 0.2s ease;
    }
    .btn-primary { background-color: rgba(16, 185, 129, 0.1); color: var(--primary); border: 1px solid rgba(16, 185, 129, 0.2); }
    .btn-primary:hover { background-color: var(--primary); color: #000; }
    .btn-secondary { background-color: transparent; color: var(--text-white); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--text-muted); background-color: rgba(255, 255, 255, 0.02); }

    /* Secciones */
    section { padding: 4rem 0; border-bottom: 1px solid var(--border); }
    .section-title {
      font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted);
      margin-bottom: 2rem; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 0.5rem;
    }
    .section-title::before { content: '//'; color: var(--primary); }

    /* Certificaciones */
    .grid-certs { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
    .cert-card {
      background-color: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2rem;
      position: relative; overflow: hidden; transition: transform 0.2s ease, border-color 0.2s ease;
      opacity: 0; transform: translateY(10px); animation: fadeInUp 0.6s forwards;
    }
    .cert-card:hover { border-color: rgba(16, 185, 129, 0.3); transform: translateY(-2px); }
    .cert-badge {
      position: absolute; top: 0; right: 0; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace;
      padding: 0.4rem 0.8rem; background-color: rgba(59, 130, 246, 0.1); color: var(--accent);
      border-bottom-left-radius: 8px; border-left: 1px solid var(--border); border-bottom: 1px solid var(--border);
    }
    .cert-badge.intl { background-color: rgba(16, 185, 129, 0.1); color: var(--primary); }
    .cert-card h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; color: #fff; padding-right: 4rem; }
    .issuer { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem; }
    .cred-id {
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: rgba(255, 255, 255, 0.4);
      background: rgba(0, 0, 0, 0.2); padding: 0.2rem 0.5rem; border-radius: 4px; display: inline-block;
    }

    /* Skills */
    .skills-wrapper { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .skill-node {
      background-color: var(--surface); border: 1px solid var(--border); padding: 0.6rem 1.2rem;
      border-radius: 6px; font-size: 0.9rem; color: var(--text-white); font-family: 'JetBrains Mono', monospace;
      display: inline-flex; align-items: center; gap: 0.5rem;
      opacity: 0; transform: translateY(10px); animation: fadeInUp 0.6s forwards;
    }
    .skill-node::before { content: ''; width: 6px; height: 6px; background-color: var(--primary); border-radius: 50%; }

    /* Footer */
    footer {
      padding: 3rem 0; color: rgba(255, 255, 255, 0.3); font-size: 0.85rem; font-family: 'JetBrains Mono', monospace;
      display: flex; justify-content: space-between; align-items: center;
    }

    /* Animaciones */
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 { font-size: 2.2rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
